<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VidTube</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    :root {
      --bg:       #0f0f0f;
      --surface:  #1a1a1a;
      --surface2: #272727;
      --border:   #2e2e2e;
      --accent:   #ff4444;
      --accent2:  #ff6b6b;
      --text:     #f1f1f1;
      --muted:    #aaaaaa;
      --radius:   10px;
      --font:     'Segoe UI', system-ui, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15,15,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; padding: 0 24px; height: 56px; gap: 16px;
    }
    .logo { font-size: 1.4rem; font-weight: 800; color: var(--accent); letter-spacing: -1px; text-decoration: none; white-space: nowrap; }
    .logo span { color: var(--text); }
    .search-bar { flex: 1; max-width: 520px; margin: 0 auto; display: flex; }
    .search-bar input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      border-right: none; border-radius: var(--radius) 0 0 var(--radius);
      padding: 8px 16px; color: var(--text); font-size: 0.95rem; outline: none; transition: border-color .2s;
    }
    .search-bar input:focus { border-color: var(--accent); }
    .search-bar button {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) 0;
      padding: 8px 16px; color: var(--muted); cursor: pointer; font-size: 1rem; transition: background .2s;
    }
    .search-bar button:hover { background: var(--border); }
    .btn-upload {
      background: var(--accent); color: #fff; border: none;
      padding: 8px 18px; border-radius: var(--radius);
      font-weight: 600; cursor: pointer; font-size: 0.9rem;
      display: flex; align-items: center; gap: 6px; transition: background .2s; white-space: nowrap;
    }
    .btn-upload:hover { background: var(--accent2); }

    /* CONFIG BANNER */
    #config-banner {
      background: linear-gradient(135deg, #1a0a0a, #2a1010);
      border: 1px solid #5a1010; border-radius: var(--radius);
      padding: 24px; margin: 32px auto; max-width: 680px;
    }
    #config-banner h2 { color: var(--accent); margin-bottom: 12px; font-size: 1.1rem; }
    #config-banner p  { color: var(--muted); font-size: 0.88rem; margin-bottom: 16px; line-height: 1.6; }
    .config-fields { display: flex; flex-direction: column; gap: 10px; }
    .config-fields input {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-size: 0.9rem; outline: none; font-family: monospace;
    }
    .config-fields input:focus { border-color: var(--accent); }
    .btn-save {
      background: var(--accent); color: #fff; border: none;
      padding: 10px 20px; border-radius: 8px; font-weight: 600;
      cursor: pointer; margin-top: 4px; width: 100%;
    }
    .btn-save:hover { background: var(--accent2); }

    /* MAIN */
    main { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

    /* GRID */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    /* CARD */
    .card {
      background: var(--surface); border-radius: var(--radius);
      overflow: hidden; cursor: pointer;
      transition: transform .2s, box-shadow .2s;
      border: 1px solid transparent;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,.6); border-color: var(--border); }
    .thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: var(--surface2); }
    .thumb-placeholder {
      width: 100%; aspect-ratio: 16/9;
      background: linear-gradient(135deg, var(--surface2), #1e1e2e);
      display: flex; align-items: center; justify-content: center; font-size: 2.5rem;
    }
    .card-info { padding: 12px; }
    .card-title {
      font-size: 0.95rem; font-weight: 600; line-height: 1.4; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-meta { font-size: 0.8rem; color: var(--muted); }

    /* OVERLAY */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,.85); backdrop-filter: blur(4px);
      align-items: center; justify-content: center; padding: 16px;
    }
    .overlay.open { display: flex; }

    /* UPLOAD MODAL */
    .modal {
      background: var(--surface); border-radius: 14px;
      width: 100%; max-width: 540px; border: 1px solid var(--border); overflow: hidden;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 22px; border-bottom: 1px solid var(--border);
    }
    .modal-header h2 { font-size: 1.05rem; font-weight: 700; }
    .btn-close {
      background: none; border: none; color: var(--muted);
      font-size: 1.4rem; cursor: pointer; line-height: 1;
      padding: 2px 6px; border-radius: 6px; transition: background .15s;
    }
    .btn-close:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 22px; display: flex; flex-direction: column; gap: 14px; }
    .modal-body label { font-size: 0.85rem; color: var(--muted); margin-bottom: 4px; display: block; }
    .modal-body input,
    .modal-body textarea {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 14px; color: var(--text);
      font-size: 0.9rem; outline: none; font-family: var(--font); transition: border-color .2s;
    }
    .modal-body input:focus,
    .modal-body textarea:focus { border-color: var(--accent); }
    .modal-body textarea { resize: vertical; min-height: 72px; }

    /* PREVIEW */
    .yt-preview {
      display: none; background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; overflow: hidden;
    }
    .yt-preview iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; }
    .yt-preview-info { padding: 10px 12px; font-size: 0.82rem; color: var(--muted); }

    .btn-submit {
      background: var(--accent); color: #fff; border: none;
      padding: 11px; border-radius: 8px; font-weight: 700;
      cursor: pointer; font-size: 0.95rem; transition: background .2s;
    }
    .btn-submit:hover { background: var(--accent2); }
    .btn-submit:disabled { background: var(--surface2); color: var(--muted); cursor: not-allowed; }

    /* PLAYER MODAL */
    .player-modal {
      background: var(--surface); border-radius: 14px;
      width: 100%; max-width: 900px; border: 1px solid var(--border); overflow: hidden;
    }
    .player-modal iframe { width: 100%; aspect-ratio: 16/9; display: block; border: none; background: #000; }
    .player-info { padding: 18px 22px; }
    .player-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 8px; }
    .player-meta  { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; }
    .player-desc  { font-size: 0.9rem; color: #ccc; line-height: 1.6; }

    /* EMPTY */
    #empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--muted); }
    #empty .empty-icon { font-size: 4rem; margin-bottom: 16px; }
    #empty h3 { font-size: 1.2rem; color: var(--text); margin-bottom: 8px; }

    /* TOAST */
    #toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #222; color: var(--text); padding: 11px 22px;
      border-radius: 99px; font-size: 0.9rem; font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,.5); z-index: 999;
      opacity: 0; transition: opacity .3s; pointer-events: none;
      border: 1px solid var(--border);
    }
    #toast.show { opacity: 1; }
    #toast.error { border-color: var(--accent); color: var(--accent); }

    /* LOADER */
    .spinner { width: 36px; height: 36px; margin: 60px auto; border: 3px solid var(--surface2); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* HINT */
    .yt-hint {
      background: var(--surface2); border-radius: 8px; padding: 12px 14px;
      font-size: 0.82rem; color: var(--muted); line-height: 1.6;
    }
    .yt-hint strong { color: var(--text); }

    @media (max-width: 600px) {
      nav { padding: 0 12px; gap: 10px; }
      .logo { font-size: 1.1rem; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="#">Vid<span>Tube</span></a>
  <div class="search-bar">
    <input type="text" id="search-input" placeholder="Buscar videos…" />
    <button onclick="doSearch()">🔍</button>
  </div>
  <button class="btn-upload" onclick="openUpload()">＋ Agregar</button>
</nav>

<div id="config-banner" style="display:none">
  <h2>⚙️ Configurar Supabase</h2>
  <p>Pega tus credenciales de <a href="https://supabase.com" target="_blank" style="color:var(--accent)">supabase.com</a> para activar la plataforma.</p>
  <div class="config-fields">
    <input id="cfg-url" type="text" placeholder="Project URL  →  https://xxxx.supabase.co" />
    <input id="cfg-key" type="text" placeholder="Publishable key  →  sb_publishable_…" />
    <button class="btn-save" onclick="saveConfig()">Guardar y conectar</button>
  </div>
</div>

<main>
  <div id="loader" class="spinner"></div>
  <div id="grid"></div>
</main>

<!-- UPLOAD OVERLAY -->
<div class="overlay" id="upload-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Agregar video de YouTube</h2>
      <button class="btn-close" onclick="closeUpload()">✕</button>
    </div>
    <div class="modal-body">
      <div class="yt-hint">
        <strong>¿Cómo funciona?</strong><br>
        1. Sube tu video a YouTube como <strong>No listado</strong><br>
        2. Copia el link y pégalo aquí<br>
        3. Se reproducirá directo en VidTube sin mostrar YouTube
      </div>
      <div>
        <label>Link de YouTube *</label>
        <input id="up-url" type="text" placeholder="https://www.youtube.com/watch?v=... o https://youtu.be/..." oninput="onUrlInput(this.value)" />
      </div>
      <div class="yt-preview" id="yt-preview">
        <iframe id="preview-iframe" allowfullscreen></iframe>
        <div class="yt-preview-info" id="preview-info"></div>
      </div>
      <div>
        <label>Título *</label>
        <input id="up-title" type="text" placeholder="Dale un título a tu video" />
      </div>
      <div>
        <label>Descripción</label>
        <textarea id="up-desc" placeholder="¿De qué trata el video?"></textarea>
      </div>
      <button class="btn-submit" id="btn-submit" onclick="submitVideo()">Publicar video</button>
    </div>
  </div>
</div>

<!-- PLAYER OVERLAY -->
<div class="overlay" id="player-overlay" onclick="closePlayer(event)">
  <div class="player-modal" onclick="event.stopPropagation()">
    <div class="modal-header" style="padding:12px 18px">
      <span></span>
      <button class="btn-close" onclick="closePlayer()">✕</button>
    </div>
    <iframe id="player-iframe" allowfullscreen></iframe>
    <div class="player-info">
      <div class="player-title" id="player-title"></div>
      <div class="player-meta"  id="player-meta"></div>
      <div class="player-desc"  id="player-desc"></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
const STORAGE_KEY_URL = 'vt_supabase_url';
const STORAGE_KEY_KEY = 'vt_supabase_key';
const TABLE = 'videos';

let sbClient = null;
let allVideos = [];

// ── CONFIG ────────────────────────────────────────────
function getConfig() {
  return { url: localStorage.getItem(STORAGE_KEY_URL)||'', key: localStorage.getItem(STORAGE_KEY_KEY)||'' };
}
function saveConfig() {
  const url = document.getElementById('cfg-url').value.trim();
  const key = document.getElementById('cfg-key').value.trim();
  if (!url || !key) { toast('Completa ambos campos', true); return; }
  localStorage.setItem(STORAGE_KEY_URL, url);
  localStorage.setItem(STORAGE_KEY_KEY, key);
  document.getElementById('config-banner').style.display = 'none';
  initSupabase(url, key);
  loadVideos();
}
function initSupabase(url, key) {
  sbClient = window.supabase.createClient(url, key);
}

// ── BOOT ─────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const { url, key } = getConfig();
  if (url && key) { initSupabase(url, key); loadVideos(); }
  else { document.getElementById('loader').style.display='none'; document.getElementById('config-banner').style.display='block'; }
});

// ── YOUTUBE UTILS ─────────────────────────────────────
function extractYTId(url) {
  const patterns = [
    /(?:youtube\.com\/watch\?v=|youtu\.be\/|youtube\.com\/embed\/)([^&?#\s]{11})/,
    /youtube\.com\/shorts\/([^&?#\s]{11})/
  ];
  for (const p of patterns) {
    const m = url.match(p);
    if (m) return m[1];
  }
  return null;
}
function ytThumb(id) { return `https://img.youtube.com/vi/${id}/hqdefault.jpg`; }
function ytEmbed(id) { return `https://www.youtube.com/embed/${id}?rel=0&modestbranding=1`; }

function onUrlInput(val) {
  const id = extractYTId(val.trim());
  const preview = document.getElementById('yt-preview');
  const iframe  = document.getElementById('preview-iframe');
  const info    = document.getElementById('preview-info');
  if (id) {
    iframe.src = ytEmbed(id);
    info.textContent = `ID detectado: ${id}`;
    preview.style.display = 'block';
  } else {
    iframe.src = '';
    preview.style.display = 'none';
  }
}

// ── LOAD ─────────────────────────────────────────────
async function loadVideos() {
  document.getElementById('loader').style.display = 'block';
  try {
    const { data, error } = await sbClient.from(TABLE).select('*').order('created_at', { ascending: false });
    if (error) throw error;
    allVideos = data || [];
    renderGrid(allVideos);
  } catch(e) {
    toast('Error al cargar: ' + e.message, true);
    renderGrid([]);
  } finally {
    document.getElementById('loader').style.display = 'none';
  }
}

// ── RENDER ────────────────────────────────────────────
function renderGrid(videos) {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  if (!videos.length) {
    grid.innerHTML = `<div id="empty"><div class="empty-icon">📭</div><h3>No hay videos aún</h3><p>¡Sé el primero en agregar uno!</p></div>`;
    return;
  }
  videos.forEach(v => {
    const card = document.createElement('div');
    card.className = 'card';
    card.onclick = () => openPlayer(v);
    const date = new Date(v.created_at).toLocaleDateString('es-DO', { day:'numeric', month:'short', year:'numeric' });
    const thumb = v.thumb_url || '';
    card.innerHTML = `
      ${thumb ? `<img class="thumb" src="${thumb}" alt="${esc(v.title)}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">` : ''}
      <div class="thumb-placeholder" ${thumb ? 'style="display:none"' : ''}>▶️</div>
      <div class="card-info">
        <div class="card-title">${esc(v.title)}</div>
        <div class="card-meta">${date}</div>
      </div>`;
    grid.appendChild(card);
  });
}

// ── SEARCH ────────────────────────────────────────────
function doSearch() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  if (!q) { renderGrid(allVideos); return; }
  renderGrid(allVideos.filter(v => v.title.toLowerCase().includes(q) || (v.description||'').toLowerCase().includes(q)));
}
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('search-input')) doSearch();
});

// ── UPLOAD ────────────────────────────────────────────
function openUpload() {
  if (!sbClient) { toast('Configura Supabase primero', true); return; }
  document.getElementById('upload-overlay').classList.add('open');
}
function closeUpload() {
  document.getElementById('upload-overlay').classList.remove('open');
}

async function submitVideo() {
  const rawUrl = document.getElementById('up-url').value.trim();
  const title  = document.getElementById('up-title').value.trim();
  const desc   = document.getElementById('up-desc').value.trim();
  const ytId   = extractYTId(rawUrl);

  if (!ytId)  { toast('Link de YouTube inválido', true); return; }
  if (!title) { toast('El título es obligatorio', true); return; }

  const btn = document.getElementById('btn-submit');
  btn.disabled = true; btn.textContent = 'Publicando…';

  try {
    const { error } = await sbClient.from(TABLE).insert({
      title,
      description: desc || null,
      video_url: `https://www.youtube.com/watch?v=${ytId}`,
      thumb_url: ytThumb(ytId),
    });
    if (error) throw error;
    toast('¡Video publicado! 🎉');
    closeUpload();
    resetForm();
    loadVideos();
  } catch(e) {
    toast('Error: ' + e.message, true);
  } finally {
    btn.disabled = false; btn.textContent = 'Publicar video';
  }
}

function resetForm() {
  ['up-url','up-title','up-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('yt-preview').style.display = 'none';
  document.getElementById('preview-iframe').src = '';
}

// ── PLAYER ────────────────────────────────────────────
function openPlayer(v) {
  const id = extractYTId(v.video_url);
  document.getElementById('player-iframe').src = id ? ytEmbed(id) : '';
  document.getElementById('player-title').textContent = v.title;
  const date = new Date(v.created_at).toLocaleDateString('es-DO', { day:'numeric', month:'long', year:'numeric' });
  document.getElementById('player-meta').textContent = `Publicado el ${date}`;
  document.getElementById('player-desc').textContent = v.description || '';
  document.getElementById('player-overlay').classList.add('open');
}
function closePlayer(e) {
  if (e && e.target !== document.getElementById('player-overlay')) return;
  document.getElementById('player-iframe').src = '';
  document.getElementById('player-overlay').classList.remove('open');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeUpload(); closePlayer(); }
});

// ── TOAST ─────────────────────────────────────────────
function toast(msg, isError=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'show' + (isError ? ' error' : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.className = '', 3200);
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
